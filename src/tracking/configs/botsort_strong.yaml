# BoT-SORT tuned for badminton singles ("strong" mode)
# - Re-ID enabled: appearance features survive occlusion + similar uniforms.
# - track_buffer raised to 90 frames (~3s at 30fps) so a player can disappear
#   behind their partner / the umpire chair and still be recovered.
# - Tighter new_track_thresh + match_thresh reduce spurious ID swaps.
# Re-ID weights for YOLO26 (end-to-end detect heads cannot supply native Re-ID features).
# Keep the file under models/yolo_player/ — see scripts/download_yolo_weights.py yolo26n-cls.pt

tracker_type: botsort
track_high_thresh: 0.30
track_low_thresh: 0.10
new_track_thresh: 0.40
track_buffer: 90
match_thresh: 0.85
fuse_score: True

# BoT-SORT specific
gmc_method: sparseOptFlow
proximity_thresh: 0.50
appearance_thresh: 0.25
with_reid: True
model: models/yolo_player/yolo26n-cls.pt
